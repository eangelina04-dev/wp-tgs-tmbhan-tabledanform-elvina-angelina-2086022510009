<!DOCTYPE html>
<html lang="id">
<head>
    <title>Formulir Pendaftaran E-KTP</title>
</head>
<body style="background-color: #C8C8C8; font-family: Roboto; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh;">

    <div style="width: 600px; background-color: #F5F5F5; border: 1px solid #999999; box-sizing: border-box; overflow: hidden;">
        
        <div style="background-color: #0000FF; padding: 25px; text-align: center; border-bottom: 1px solid #999999;">
            <h1 style="margin: 0; font-size: 18px; color: #000000; font-weight: bold; font-family: Roboto;">FORMULIR PENDAFTARAN E-KTP</h1>
        </div>

        <table style="width: 100%; border-collapse: collapse; font-size: 13px; color: #333333;">
            <tr>
                <td style="padding: 20px 5px 15px 25px; width: 160px; font-family: Roboto;">Nomor Pendaftaran</td>
                <td style="padding: 20px 5px 15px 2px;">:</td>
                <td style="padding: 20px 25px 15px 5px;">
                    <input type="text" style="width: 35px; box-shadow: inset 1px 1px 2px #CCCCCC; border: 1px solid #999999; font-family: Roboto;"> 
                    <input type="text" style="width: 35px; box-shadow: inset 1px 1px 2px #CCCCCC; border: 1px solid #999999; font-family: Roboto;"> 
                    <input type="text" style="width: 35px; box-shadow: inset 1px 1px 2px #cccccc; border: 1px solid #999999; font-family: Roboto;"> 
                    <input type="text" style="width: 35px; box-shadow: inset 1px 1px 2px #CCCCCC; border: 1px solid #999999; font-family: Roboto;"> 
                    <input type="text" style="width: 35px; box-shadow: inset 1px 1px 2px #CCCCCC; border: 1px solid #999999; font-family: Roboto;">
                </td>
            </tr>

            <tr>
                <td style="padding: 15px 5px 15px 25px; font-family: Roboto;">Nama</td>
                <td style="padding: 15px 5px;">:</td>
                <td style="padding: 15px 25px 15px 5px;">
                    <input type="text" style="width: 250px; box-shadow: inset 1px 1px 2px #CCCCCC; border: 1px solid #999999; font-family: Roboto;">
                </td>
            </tr>

            <tr>
                <td style="padding: 15px 5px 15px 25px; font-family: Roboto;">Tempat, Tanggal lahir</td>
                <td style="padding: 15px 5px;">:</td>
                <td style="padding: 15px 25px 15px 5px; font-family: Roboto;">
                    Tempat <input type="text" style="width: 80px; box-shadow: inset 1px 1px 2px #CCCCCC; border: 1px solid #999999; font-family: Roboto;"> 
                    Tanggal lahir 
                    <input type="date" style="width: 140px; background: linear-gradient(to bottom, #FFFFFF 0%, #E1E1E1 100%); border: 1px solid #999999; padding: 2px; cursor: pointer; font-family: Roboto;">
                </td>
            </tr>

            <tr>
                <td style="padding: 15px 5px 15px 25px; font-family: Roboto;">Pekerjaan</td>
                <td style="padding: 15px 5px;">:</td>
                <td style="padding: 15px 25px 15px 5px;">
                    <input type="text" style="width: 150px; box-shadow: inset 1px 1px 2px #CCCCCC; border: 1px solid #999999; font-family: Roboto;">
                </td>
            </tr>

            <tr>
                <td style="padding: 15px 5px 15px 25px; vertical-align: top; font-family: Roboto;">Status Pernikahan</td>
                <td style="padding: 15px 5px; vertical-align: top;">:</td>
                <td style="padding: 15px 25px 15px 5px; font-family: Roboto;">
                    <label><input type="checkbox" name="status"> Menikah</label>
                    <label><input type="checkbox" name="status"> Belum Menikah</label>
                    <label><input type="checkbox" name="status"> Janda</label>
                    <label><input type="checkbox" name="status"> Duda</label>
                </td>
            </tr>

            <tr>
                <td style="padding: 15px 5px 15px 25px; vertical-align: top; font-family: Roboto;">Alamat</td>
                <td style="padding: 15px 5px; vertical-align: top;">:</td>
                <td style="padding: 15px 25px 15px 5px;">
                    <textarea style="width: 250px; height: 50px; box-shadow: inset 1px 1px 2px #CCCCCC; border: 1px solid #999999; font-family: Roboto;"></textarea>
                </td>
            </tr>

            <tr>
                <td style="padding: 15px 5px 15px 25px; font-family: Roboto;">Agama</td>
                <td style="padding: 15px 5px;">:</td>
                <td style="padding: 15px 25px 15px 5px;">
                    <select style="width: 120px; background: linear-gradient(to bottom, #FFFFFF 0%, #e1e1e1 100%); border: 1px solid #999999; padding: 2px; cursor: pointer; font-family: Roboto; font-size: 13px;">
                        <option>Islam</option>
                        <option>Kristen</option>
                        <option>Katolik</option>
                        <option>Hindu</option>
                        <option>Budha</option>
                        <option>Khonghucu</option>
                    </select>
                </td>
            </tr>

            <tr>
                <td style="padding: 15px 5px 15px 25px; font-family: Roboto;">RT/RW</td>
                <td style="padding: 15px 5px;">:</td>
                <td style="padding: 15px 25px 15px 5px; font-family: Roboto;">
                    Rt <input type="text" style="width: 60px; box-shadow: inset 1px 1px 2px #CCCCCC; border: 1px solid #999999; font-family: Roboto;"> 
                    Rw <input type="text" style="width: 60px; box-shadow: inset 1px 1px 2px #CCCCCC; border: 1px solid #999999; font-family: Roboto;">
                </td>
            </tr>

            <tr>
                <td style="padding: 15px 5px 15px 25px; font-family: Roboto;">Kelurahan</td>
                <td style="padding: 15px 5px;">:</td>
                <td style="padding: 15px 25px 15px 5px;"><input type="text" style="width: 150px; box-shadow: inset 1px 1px 2px #CCCCCC; border: 1px solid #999999; font-family: Roboto;"></td>
            </tr>
            <tr>
                <td style="padding: 15px 5px 15px 25px; font-family: Roboto;">Kecamatan</td>
                <td style="padding: 15px 5px;">:</td>
                <td style="padding: 15px 25px 15px 5px;"><input type="text" style="width: 150px; box-shadow: inset 1px 1px 2px #CCCCCC; border: 1px solid #999999; font-family: Roboto;"></td>
            </tr>
            <tr>
                <td style="padding: 15px 5px 15px 25px; font-family: Roboto;">Kabupaten</td>
                <td style="padding: 15px 5px;">:</td>
                <td style="padding: 15px 25px 15px 5px;"><input type="text" style="width: 150px; box-shadow: inset 1px 1px 2px #CCCCCC; border: 1px solid #999999; font-family: Roboto;"></td>
            </tr>
            <tr>
                <td style="padding: 15px 5px 15px 25px; font-family: Roboto;">Provinsi</td>
                <td style="padding: 15px 5px;">:</td>
                <td style="padding: 15px 25px 15px 5px;"><input type="text" style="width: 150px; box-shadow: inset 1px 1px 2px #CCCCCC; border: 1px solid #999999; font-family: Roboto;"></td>
            </tr>
            <tr>
                <td style="padding: 15px 5px 15px 25px; font-family: Roboto;">Jenis Kelamin</td>
                <td style="padding: 15px 5px;">:</td>
                <td style="padding: 15px 25px 15px 5px; font-family: Roboto;">
                    <label><input type="radio" name="jk"> Pria</label>
                    <label><input type="radio" name="jk"> Wanita</label>
                </td>
            </tr>
            <tr>
                <td style="padding: 15px 5px 25px 25px; font-family: Roboto;">Tanggal Pendaftaran</td>
                <td style="padding: 15px 5px 25px 5px;">:</td>
                <td style="padding: 15px 25px 25px 5px; font-family: Roboto;">
                    Tanggal <input type="text" style="width: 50px; box-shadow: inset 1px 1px 2px #CCCCCC; border: 1px solid #999999; font-family: Roboto;"> 
                    Bulan <input type="text" style="width: 100px; box-shadow: inset 1px 1px 2px #CCCCCC; border: 1px solid #999999; font-family: Roboto;">
                </td>
            </tr>
            <tr>
                <td style="width: 160px;"></td>
                <td colspan="2" style="text-align: left; padding-bottom: 40px;">
                    <button style="margin-right: -1px; padding: 5px 15px; cursor: pointer; background: linear-gradient(to bottom, #FFFFFF 0%, #E1E1E1 100%); border: 1px solid #999999; font-size: 13px; font-family: Roboto; color: #000000;">Daftar</button>
                    <button style="padding: 5px 15px; cursor: pointer; background: linear-gradient(to bottom, #FFFFFF 0%, #E1E1E1 100%); border: 1px solid #999999; font-size: 13px; font-family: Roboto; color: #000000;">Cancel</button>
                </td>
            </tr>
        </table>
    </div>
</body>
</html>
